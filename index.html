<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Loop Trainer">
<meta name="theme-color" content="#0e0e0e">
<link rel="manifest" href="manifest.json">
<title>Loop Trainer</title>
<style>
:root{--bg:#0e0e0e;--sur:#1c1c1e;--sur2:#2c2c2e;--acc:#0a84ff;--grn:#30d158;--red:#ff453a;--yel:#ffd60a;--ora:#ff9f0a;--txt:#f2f2f7;--dim:#8e8e93;--brd:#38383a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;padding:14px 14px calc(env(safe-area-inset-bottom,0px) + 48px);padding-top:calc(env(safe-area-inset-top,0px) + 14px)}
h1{text-align:center;font-size:18px;font-weight:700;letter-spacing:3px;color:var(--acc);padding:10px 0 4px}
.sub{text-align:center;font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.card{background:var(--sur);border-radius:18px;padding:16px;margin-bottom:10px}
#fileInput{position:fixed;top:-999px;left:-999px;width:1px;height:1px;opacity:0}
.open-lbl{display:inline-block;background:var(--acc);color:#fff;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;margin-left:auto}
.open-lbl:active{opacity:.7}
.lib-header{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.track-name-top{font-size:13px;color:var(--txt);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.status{background:var(--sur2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--dim);text-align:center;margin-bottom:10px;display:none}
.status.err{color:var(--red)}.status.ok{color:var(--grn)}
.lib-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--brd);cursor:pointer;touch-action:manipulation}
.lib-item:last-child{border-bottom:none}
.lib-item:active{opacity:.6}
.lib-icon{width:36px;height:36px;border-radius:8px;background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lib-info{flex:1;min-width:0}
.lib-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-meta{font-size:11px;color:var(--dim);margin-top:2px}
.lib-del{background:none;border:none;color:var(--red);font-size:12px;font-weight:600;padding:8px;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.lib-del:active{opacity:.5}
.lib-empty{text-align:center;color:#444;font-size:13px;padding:10px 0}
.wave-card{background:var(--sur);border-radius:18px;padding:12px;margin-bottom:10px}
#waveCanvas{display:block;width:100%;height:170px;border-radius:10px;background:var(--sur2);touch-action:none}
.wave-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.wave-time{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
.zbtns{display:flex;gap:6px}
.zbtn{background:var(--sur2);color:var(--txt);border:none;border-radius:8px;padding:6px 16px;font-size:18px;font-weight:600;cursor:pointer;touch-action:manipulation}
.zbtn:active{opacity:.6}
.controls{display:flex;align-items:center;justify-content:center;gap:10px}
.cbtn{background:var(--sur2);color:var(--txt);border:none;border-radius:12px;padding:12px 15px;font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation}
.cbtn:active{opacity:.6}
.play-btn{width:50px;height:50px;border-radius:25px;background:var(--acc);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center}
.cue-play-btn{width:50px;height:50px;border-radius:25px;background:var(--ora);color:#000;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
.cue-play-btn:active{opacity:.7}
.speed-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.speed-num-sm{font-size:18px;font-weight:700;color:var(--acc);min-width:40px;text-align:center;font-variant-numeric:tabular-nums}
.speed-lbl{font-size:11px;color:var(--dim);font-weight:600}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:var(--sur2);border-radius:3px;outline:none;margin-bottom:14px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:14px;background:var(--acc);box-shadow:0 2px 6px rgba(0,0,0,.5)}
input[type=number]{-webkit-appearance:none;-moz-appearance:textfield}
.presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.pbtn{background:var(--sur2);color:var(--dim);border:none;border-radius:9px;padding:9px 11px;font-size:13px;font-weight:500;cursor:pointer;touch-action:manipulation;min-width:46px;text-align:center}
.pbtn.on{background:var(--acc);color:#fff}
.pbtn:active{opacity:.6}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:13px}
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.lp-btn{border:none;border-radius:10px;padding:8px 6px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation}
.lp-btn:active{opacity:.7}
.lp-in{background:rgba(48,209,88,.15);color:var(--grn);border:1.5px solid var(--grn)}
.lp-out{background:rgba(255,69,58,.15);color:var(--red);border:1.5px solid var(--red)}
.lp-t{font-size:11px;font-weight:400;margin-top:2px;font-variant-numeric:tabular-nums;opacity:.85}
.loop-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.loop-row-lbl{font-size:13px;font-weight:600;flex:1}
.toggle{width:44px;height:24px;background:var(--sur2);border-radius:12px;position:relative;cursor:pointer;touch-action:manipulation;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:10px;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.toggle.on::after{left:22px}
.tog-lbl{font-size:12px;color:var(--dim);min-width:22px}
.deck-sep{height:1px;background:var(--brd);margin:8px 0}
.edit-banner{background:rgba(48,209,88,.12);border:1px solid var(--grn);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--grn);margin-bottom:11px;display:none}
.save-row{display:flex;gap:6px}
.name-inp{flex:1;background:var(--sur2);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:9px 10px;font-size:13px;-webkit-appearance:none}
.name-inp::placeholder{color:#555}
.name-inp:focus{outline:none;border-color:var(--acc)}
.save-btn{background:var(--acc);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.save-btn:active{opacity:.7}
.loop-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--brd)}
.loop-item:last-child{border-bottom:none}
.ldot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.linfo{flex:1;min-width:0}
.lname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ltimes{font-size:12px;color:var(--dim);margin-top:3px;font-variant-numeric:tabular-nums}
.lacts{display:flex;gap:6px;flex-shrink:0}
.labtn{background:var(--sur2);border:none;border-radius:9px;padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation}
.labtn:active{opacity:.6}
.la-load{color:var(--acc)}.la-edit{color:var(--grn)}.la-del{color:var(--red)}
.empty{text-align:center;color:#444;font-size:13px;padding:10px 0}
/* Grid / BPM */
.grid-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.grid-bpm{font-size:22px;font-weight:700;color:var(--yel);font-variant-numeric:tabular-nums}
.grid-ts{font-size:16px;font-weight:600;color:var(--dim);margin-left:2px}
.grid-edit-btn{margin-left:auto;font-size:12px;padding:8px 14px;background:var(--yel);color:#000;border-radius:10px;font-weight:700}
.grid-edit-btn.active{background:var(--grn)}
.grid-panel{margin-top:14px;display:none}
.grid-panel.show{display:block}
.grid-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.grid-lbl{font-size:12px;font-weight:600;color:var(--dim);min-width:55px}
.grid-inp{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:15px;font-weight:600;width:85px;text-align:center;font-variant-numeric:tabular-nums}
.grid-inp:focus{outline:none;border-color:var(--yel)}
.grid-inp-sm{width:45px;padding:8px 6px;font-size:14px;text-align:center}
.grid-sel{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:15px;font-weight:600;-webkit-appearance:none;appearance:none;min-width:70px;text-align:center}
.grid-sel:focus{outline:none;border-color:var(--yel)}
.bpm-adj{background:var(--sur2);color:var(--yel);border:1px solid var(--brd);border-radius:10px;width:38px;height:38px;font-size:20px;font-weight:700;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.bpm-adj:active{opacity:.6}
.tap-btn{background:var(--yel);color:#000;font-size:16px;font-weight:800;padding:14px 24px;border-radius:14px;min-width:70px;letter-spacing:1px}
.tap-btn:active{opacity:.7;transform:scale(0.95)}
.tap-bpm-val{font-size:15px;font-weight:600;color:var(--yel);font-variant-numeric:tabular-nums}
.tap-apply{background:var(--grn);color:#000;font-size:13px;font-weight:700;padding:10px 14px;border-radius:10px}
.grid-hint{font-size:11px;color:var(--dim);text-align:center;margin:6px 0 10px;font-style:italic}
.grid-done{background:var(--acc);color:#fff;width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600}
.grid-reset{background:var(--sur2);color:var(--dim);font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;border:none;cursor:pointer}
.grid-refine{background:rgba(255,159,10,.2);color:var(--ora);font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;border:1px solid var(--ora);cursor:pointer}
.grid-refine:active,.grid-reset:active{opacity:.6}
.custom-ts-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.custom-ts-row .grid-inp-sm{width:40px}
.ts-slash{font-size:16px;font-weight:700;color:var(--dim)}
.ts-add{background:var(--grn);color:#000;font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap}
/* Hot Cues */
.hc-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--brd)}
.hc-item:last-child{border-bottom:none}
.hc-num{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#000;flex-shrink:0}
.hc-info{flex:1;min-width:0}
.hc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc-time{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.hc-acts{display:flex;gap:5px;flex-shrink:0}
.hc-btn{background:var(--sur2);border:none;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:600;cursor:pointer}
.hc-btn:active{opacity:.6}
.hc-go{color:var(--acc)}.hc-cue{color:var(--ora)}.hc-del{color:var(--red)}
/* Log */
.log-toggle{display:block;width:100%;background:none;border:1px solid var(--brd);color:var(--dim);border-radius:13px;padding:12px;font-size:12px;cursor:pointer;margin-top:20px;text-align:center}
.log-toggle:active{opacity:.6}
#logPanel{display:none;margin-top:6px;background:var(--sur);border-radius:12px;padding:12px;max-height:300px;overflow-y:auto}
#logPanel.show{display:block}
#logContent{font-family:monospace;font-size:10px;color:var(--dim);white-space:pre-wrap;word-break:break-all}
.log-copy{background:var(--sur2);color:var(--dim);border:none;border-radius:8px;padding:8px 14px;font-size:11px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<h1>LOOP TRAINER</h1>
<p class="sub">Drum practice tool</p>
<input type="file" id="fileInput" accept="audio/*,.mp3,.m4a,.wav,.aac,.ogg,.flac">
<div class="status" id="statusBar"></div>
<!-- BPM / Grid card (above waveform) — includes track name -->
<div class="card" id="gridCard" style="display:none">
  <div class="track-name-top" id="trackName">No track loaded</div>
  <div class="grid-info">
    <span class="grid-bpm" id="gridBpmDisp">-- BPM</span>
    <span class="grid-ts" id="gridTsDisp">4/4</span>
    <button class="cbtn grid-edit-btn" id="gridEditBtn" onclick="toggleGridEdit()">Edit Grid</button>
  </div>
  <div class="grid-panel" id="gridPanel">
    <div class="grid-row">
      <span class="grid-lbl">BPM</span>
      <button class="bpm-adj" onclick="nudgeBpm(-0.1)">&#8722;</button>
      <input type="number" class="grid-inp" id="gridBpmInp" step="0.1" min="20" max="300" inputmode="decimal" onchange="onBpmInput(this.value)">
      <button class="bpm-adj" onclick="nudgeBpm(0.1)">+</button>
    </div>
    <div class="grid-row">
      <span class="grid-lbl">Time Sig</span>
      <select class="grid-sel" id="gridTsSel" onchange="onTsChange()"></select>
    </div>
    <div id="customTsArea" style="display:none">
      <div class="custom-ts-row">
        <input type="number" class="grid-inp grid-inp-sm" id="customTsTop" min="1" max="32" value="7">
        <span class="ts-slash">/</span>
        <input type="number" class="grid-inp grid-inp-sm" id="customTsBot" min="1" max="32" value="8">
        <button class="cbtn" style="font-size:12px;padding:8px 12px" onclick="applyCustomTs()">Use</button>
        <button class="ts-add" onclick="saveCustomTs()">+ Save</button>
      </div>
    </div>
    <div class="grid-row">
      <button class="cbtn tap-btn" onclick="tapTempo()">TAP</button>
      <span class="tap-bpm-val" id="tapBpmVal">--</span>
      <button class="cbtn tap-apply" onclick="applyTapBpm()">Apply</button>
    </div>
    <div class="grid-row" style="gap:8px">
      <button class="grid-refine" onclick="refineBpmFromCurrent()">Refine BPM</button>
      <button class="grid-reset" onclick="resetToDetected()">Reset to detected</button>
    </div>
    <div class="grid-hint">Top half: drag to shift grid &middot; Bottom half: drag to scroll track</div>
    <button class="cbtn grid-done" onclick="toggleGridEdit()">Done</button>
  </div>
</div>
<!-- Waveform -->
<div class="wave-card" id="waveCard" style="display:none">
  <canvas id="waveCanvas"></canvas>
  <div class="wave-foot">
    <span class="wave-time" id="waveTime">0:00 / 0:00</span>
    <div class="zbtns">
      <button class="zbtn" onclick="doZoom(2)">&#8722;</button>
      <button class="zbtn" onclick="doZoom(0.5)">+</button>
    </div>
  </div>
</div>
<!-- Deck: transport + loop + cue + speed in one compact card -->
<div class="card" id="deckCard" style="display:none;padding:12px">
  <!-- Transport row: skip / cue / play / skip / transfer -->
  <div class="controls" style="margin-bottom:8px">
    <button class="cbtn" onclick="skip(-5)" style="padding:8px 10px;font-size:12px">-5s</button>
    <button class="cbtn cue-play-btn" onclick="cueBtnPress()">CUE</button>
    <button class="cbtn play-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
    <button class="cbtn" onclick="skip(5)" style="padding:8px 10px;font-size:12px">+5s</button>
    <button class="cbtn" onclick="transferCueToHotCue()" style="padding:8px 10px;font-size:10px;background:rgba(255,159,10,.2);color:var(--ora);border:1px solid var(--ora)">&#8594; Hot Cue</button>
  </div>
  <div class="deck-sep"></div>
  <!-- Loop row -->
  <div class="lp-grid">
    <button class="lp-btn lp-in" onclick="setIn()">In <span class="lp-t" id="inTime">--:--</span></button>
    <button class="lp-btn lp-out" onclick="setOut()">Out <span class="lp-t" id="outTime">--:--</span></button>
  </div>
  <div class="loop-row">
    <span class="loop-row-lbl">Loop</span>
    <div class="toggle" id="loopToggle" onclick="toggleLoop()"></div>
    <span class="tog-lbl" id="togLbl">OFF</span>
  </div>
  <div class="edit-banner" id="editBanner">Editing saved loop &mdash; adjust then tap Update</div>
  <div class="save-row">
    <input type="text" class="name-inp" id="loopName" placeholder="Loop name" maxlength="30">
    <button class="save-btn" id="saveBtn" onclick="saveLoop()">Save</button>
  </div>
  <div class="deck-sep"></div>
  <!-- Speed row -->
  <div class="speed-row">
    <span class="speed-lbl">Speed</span>
    <span class="speed-num-sm" id="speedNum">1.0</span>
    <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.05" value="1.0"
           oninput="setSpeed(parseFloat(this.value))" style="flex:1;margin-bottom:0">
  </div>
  <div class="presets" style="margin-top:4px">
    <button class="pbtn" onclick="setSpeed(0.5)" style="padding:5px 7px;font-size:11px;min-width:34px">0.5</button>
    <button class="pbtn" onclick="setSpeed(0.7)" style="padding:5px 7px;font-size:11px;min-width:34px">0.7</button>
    <button class="pbtn" onclick="setSpeed(0.8)" style="padding:5px 7px;font-size:11px;min-width:34px">0.8</button>
    <button class="pbtn" onclick="setSpeed(0.9)" style="padding:5px 7px;font-size:11px;min-width:34px">0.9</button>
    <button class="pbtn on" onclick="setSpeed(1.0)" style="padding:5px 7px;font-size:11px;min-width:34px">1.0</button>
    <button class="pbtn" onclick="setSpeed(1.1)" style="padding:5px 7px;font-size:11px;min-width:34px">1.1</button>
    <button class="pbtn" onclick="setSpeed(1.2)" style="padding:5px 7px;font-size:11px;min-width:34px">1.2</button>
    <button class="pbtn" onclick="setSpeed(1.5)" style="padding:5px 7px;font-size:11px;min-width:34px">1.5</button>
  </div>
</div>
<!-- Saved Loops -->
<div class="card" id="savedCard" style="display:none">
  <div class="sec-lbl">Saved Loops</div>
  <div id="loopList"><div class="empty">No saved loops yet</div></div>
</div>
<!-- Hot Cues -->
<div class="card" id="hotcueCard" style="display:none">
  <div class="sec-lbl">Hot Cues</div>
  <div class="save-row" style="margin-bottom:8px">
    <input type="text" class="name-inp" id="hotcueName" placeholder="Hot cue name" maxlength="20">
    <button class="save-btn" onclick="saveHotCue()" style="background:var(--ora)">+ Cue</button>
  </div>
  <div id="hotcueList"><div class="empty">No hot cues</div></div>
</div>
<!-- Library (at bottom) -->
<div class="card" id="libCard">
  <div class="lib-header">
    <span class="sec-lbl" style="margin-bottom:0">Library</span>
    <label for="fileInput" class="open-lbl">Open Audio File</label>
  </div>
  <div id="libList"><div class="lib-empty">No saved tracks</div></div>
</div>
<button class="log-toggle" onclick="toggleLogPanel()">Show Debug Log</button>
<div id="logPanel">
  <div id="logContent"></div>
  <button class="log-copy" onclick="copyLog()">Copy Log to Clipboard</button>
</div>

<script>
// ── Debug Log ────────────────────────────────────────────────────────────────
var logLines = [];
function log(msg) {
  var ts = new Date().toLocaleTimeString();
  logLines.push('[' + ts + '] ' + msg);
  if (logLines.length > 200) logLines.shift();
  var el = document.getElementById('logContent');
  if (el) el.textContent = logLines.join('\n');
}
function toggleLogPanel() { document.getElementById('logPanel').classList.toggle('show'); }
function copyLog() {
  var text = logLines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){ alert('Copied!'); }, function(){ fbCopy(text); });
  } else fbCopy(text);
}
function fbCopy(t) {
  var ta = document.createElement('textarea'); ta.value = t;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); alert('Copied!'); } catch(e) {}
  document.body.removeChild(ta);
}
window.onerror = function(m,s,l){ log('ERROR: '+m+' line '+l); };
window.addEventListener('unhandledrejection', function(e){
  log('PROMISE ERR: '+(e.reason?e.reason.message||e.reason:'?'));
});
log('App start');

// ── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(r){
    log('SW OK');
  }).catch(function(e){ log('SW fail: '+e.message); });
}

// ══════════════════════════════════════════════════════════════════════════════
//  IndexedDB
// ══════════════════════════════════════════════════════════════════════════════
var DB_NAME = 'loopTrainerDB', DB_VER = 1, STORE = 'tracks';
function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}
function saveTrackToDB(id, name, arrayBuf, dur) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put({ id:id, name:name, data:arrayBuf, duration:dur, savedAt:Date.now() });
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function loadTrackFromDB(id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(STORE, 'readonly');
      var req = tx.objectStore(STORE).get(id);
      req.onsuccess = function() { resolve(req.result || null); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function deleteTrackFromDB(id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function getLibrary() { try { return JSON.parse(localStorage.getItem('library')||'[]'); } catch(e) { return []; } }
function saveLibrary(lib) { localStorage.setItem('library', JSON.stringify(lib)); }
function trackId(name, size) { return name + '__' + size; }

// ══════════════════════════════════════════════════════════════════════════════
//  iOS Silent Mode Fix
// ══════════════════════════════════════════════════════════════════════════════
var silentUnlocked = false;
function unlockSilentMode() {
  if (silentUnlocked) return;
  silentUnlocked = true;
  var sr = 44100, len = sr;
  var buf = new ArrayBuffer(44 + len * 2);
  var dv = new DataView(buf);
  function ws(off, s) { for (var i = 0; i < s.length; i++) dv.setUint8(off + i, s.charCodeAt(i)); }
  ws(0,'RIFF'); dv.setUint32(4, 36 + len * 2, true); ws(8,'WAVE');
  ws(12,'fmt '); dv.setUint32(16, 16, true); dv.setUint16(20, 1, true);
  dv.setUint16(22, 1, true); dv.setUint32(24, sr, true); dv.setUint32(28, sr * 2, true);
  dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
  ws(36,'data'); dv.setUint32(40, len * 2, true);
  var blob = new Blob([buf], { type: 'audio/wav' });
  var a = document.createElement('audio');
  a.src = URL.createObjectURL(blob);
  a.loop = true; a.volume = 0.001;
  a.play().catch(function(e){ log('Silent unlock: ' + e.message); });
  log('Silent mode unlock attempted');
}

// ══════════════════════════════════════════════════════════════════════════════
//  AudioContext + Web Audio playback
// ══════════════════════════════════════════════════════════════════════════════
function ensureCtx() {
  if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); unlockSilentMode(); }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function audTime() {
  if (!playing || !audioCtx) return playAudT;
  var t = playAudT + (audioCtx.currentTime - playCtxT) * speed;
  if (loopOn && loopIn !== null && loopOut !== null && loopIn < loopOut) {
    if (t >= loopOut) { var len = loopOut - loopIn; t = loopIn + ((t - loopIn) % len); }
  }
  return Math.max(0, Math.min(duration, t));
}

function startAt(offset) {
  if (!audioBuf) return;
  ensureCtx(); killSrc();
  var s = audioCtx.createBufferSource();
  s.buffer = audioBuf; s.playbackRate.value = speed;
  if (loopOn && loopIn !== null && loopOut !== null && loopIn < loopOut) {
    s.loop = true; s.loopStart = loopIn; s.loopEnd = loopOut;
  }
  s.connect(audioCtx.destination);
  var off = Math.max(0, Math.min(duration, offset));
  playAudT = off; playCtxT = audioCtx.currentTime;
  s.start(0, off); playing = true; srcNode = s;
  s.onended = function() { if (srcNode === s) { playing = false; srcNode = null; updPlayBtn(); } };
  updPlayBtn();
}

function killSrc() {
  if (!srcNode) return;
  var t = audTime(); var s = srcNode;
  srcNode = null; playing = false;
  try { s.stop(); } catch(e) {}
  try { s.disconnect(); } catch(e) {}
  playAudT = t;
}

function stopPlay() { killSrc(); updPlayBtn(); }
function togglePlay() {
  if (!audioBuf) { setStatus('Load a track first.', 'err'); return; }
  ensureCtx();
  if (playing) stopPlay(); else startAt(playAudT);
}
function skip(s) {
  var t = audTime() + s, was = playing; stopPlay();
  playAudT = Math.max(0, Math.min(duration, t));
  if (was) startAt(playAudT); drawWave();
}
function seekTo(t) {
  var was = playing; stopPlay();
  playAudT = Math.max(0, Math.min(duration, t));
  if (was) startAt(playAudT); drawWave();
}
function updPlayBtn() {
  document.getElementById('playBtn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  log('File: ' + file.name + ' ' + (file.size/1024/1024).toFixed(1) + 'MB');
  ensureCtx(); setStatus('Reading file...');
  var reader = new FileReader();
  reader.onload = function(ev) { decodeAndLoad(file.name, file.size, ev.target.result, true); };
  reader.onerror = function() { setStatus('Could not read file.', 'err'); };
  reader.readAsArrayBuffer(file);
});

function decodeAndLoad(name, size, arrayBuf, saveToLib) {
  setStatus('Decoding audio...');
  var bufForDecode = saveToLib ? arrayBuf.slice(0) : arrayBuf;
  ensureCtx();
  audioCtx.decodeAudioData(bufForDecode, function(buf) {
    stopPlay();
    audioBuf = buf; duration = buf.duration;
    trkName = name; trkId = trackId(name, size);
    playAudT = 0;
    loopIn = null; loopOut = null; loopOn = false; editIdx = -1;
    cuePoint = null;
    pkLow = null; pkMid = null; pkHigh = null; pkMin = null; pkMax = null;
    resetEditor(); updLoopUI(); updPlayBtn();
    document.getElementById('trackName').textContent = name;
    ['gridCard','waveCard','deckCard','savedCard','hotcueCard'].forEach(function(id) {
      document.getElementById(id).style.display = 'block';
    });
    vStart = 0; vEnd = duration;
    computePeaks(buf);

    // Load saved grid or auto-detect BPM
    var savedGrid = loadGridSettings();
    if (savedGrid) {
      gridBPM = savedGrid.bpm; gridOffset = savedGrid.offset;
      gridTimeSigTop = savedGrid.tsTop; gridTimeSigBot = savedGrid.tsBot;
      detectedBPM = savedGrid.detBpm || gridBPM;
      detectedOffset = savedGrid.detOff || gridOffset;
    } else {
      var detected = detectBPM(buf, 60, 200);
      gridBPM = detected.bpm; gridOffset = detected.offset;
      detectedBPM = detected.bpm; detectedOffset = detected.offset;
      gridTimeSigTop = 4; gridTimeSigBot = 4;
    }
    updateGridDisplay();

    // Load saved cue
    var savedCue = loadCuePoint();
    cuePoint = savedCue;
    updateCueDisplay();
    renderHotCues();

    setTimeout(function() {
      resizeCanvas();
      document.getElementById('waveTime').textContent = '0:00 / ' + fmt(duration);
    }, 50);
    if (saveToLib) {
      saveTrackToDB(trkId, name, arrayBuf, duration).then(function() {
        var lib = getLibrary().filter(function(x) { return x.id !== trkId; });
        lib.unshift({ id:trkId, name:name, size:size, duration:duration, lastPlayed:Date.now() });
        saveLibrary(lib); renderLibrary();
      }).catch(function(err) { log('DB save err: ' + err.message); });
    } else {
      var lib = getLibrary();
      lib.forEach(function(x) { if (x.id === trkId) x.lastPlayed = Date.now(); });
      saveLibrary(lib); renderLibrary();
    }
    renderLoops();
    setStatus('Ready - tap play!', 'ok');
    setTimeout(function(){ setStatus(''); }, 2000);
    log('Loaded: ' + name + ' (' + duration.toFixed(1) + 's) BPM=' + gridBPM);
  }, function(err) {
    log('Decode failed: ' + (err ? err.message || err : '?'));
    setStatus('Could not decode audio.', 'err');
  });
}

function loadFromLibrary(id) {
  ensureCtx(); setStatus('Loading from library...');
  loadTrackFromDB(id).then(function(r) {
    if (!r) { setStatus('Track not found.', 'err'); return; }
    decodeAndLoad(r.name, r.data.byteLength, r.data, false);
  }).catch(function(err) { setStatus('Load error.', 'err'); });
}

function deleteFromLibrary(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this track from library?')) return;
  deleteTrackFromDB(id).catch(function(){});
  var lib = getLibrary(), entry = lib.find(function(x){ return x.id === id; });
  if (entry) {
    try { localStorage.removeItem('loops__' + entry.name); } catch(ex) {}
    try { localStorage.removeItem('grid__' + entry.name); } catch(ex) {}
    try { localStorage.removeItem('cue__' + entry.name); } catch(ex) {}
    try { localStorage.removeItem('hotcues__' + entry.name); } catch(ex) {}
  }
  saveLibrary(lib.filter(function(x) { return x.id !== id; }));
  renderLibrary();
}

function renderLibrary() {
  var lib = getLibrary(), el = document.getElementById('libList');
  if (!lib.length) { el.innerHTML = '<div class="lib-empty">No saved tracks</div>'; return; }
  el.innerHTML = lib.map(function(t) {
    var date = new Date(t.lastPlayed || 0).toLocaleDateString();
    var loops = []; try { loops = JSON.parse(localStorage.getItem('loops__'+t.name)||'[]'); } catch(ex) {}
    var ls = loops.length ? loops.length + ' loop' + (loops.length>1?'s':'') : '';
    return '<div class="lib-item" onclick="loadFromLibrary(\''+esc(t.id).replace(/'/g,"\\'")+'\')">' +
      '<div class="lib-icon">&#9835;</div><div class="lib-info">' +
      '<div class="lib-name">'+esc(t.name)+'</div>' +
      '<div class="lib-meta">'+fmt(t.duration)+' &middot; '+date+(ls?' &middot; '+ls:'')+'</div>' +
      '</div><button class="lib-del" onclick="deleteFromLibrary(\''+esc(t.id).replace(/'/g,"\\'") +
      '\', event)">Del</button></div>';
  }).join('');
}

  if (playing && audioCtx) { playAudT = audTime(); playCtxT = audioCtx.currentTime; }
  speed = s;
  if (srcNode) srcNode.playbackRate.value = s;
  var d = s.toFixed(2).replace(/0$/,''); if (d.indexOf('.')<0) d += '.0';
  document.getElementById('speedNum').textContent = d;
  document.getElementById('speedSlider').value = s;
  document.querySelectorAll('.pbtn').forEach(function(b){
    b.classList.toggle('on', Math.abs(parseFloat(b.textContent)-s)<0.001);
  });

function setIn() {
  if (!duration) return;
  loopIn = audTime();
  document.getElementById('inTime').textContent = fmt(loopIn);
  if (loopOut !== null && loopIn < loopOut) { loopOn = true; updLoopUI(); applyLoop(); }
  drawWave();
}
function setOut() {
  if (!duration) return;
  loopOut = audTime();
  document.getElementById('outTime').textContent = fmt(loopOut);
  if (loopIn !== null && loopIn < loopOut) { loopOn = true; updLoopUI(); applyLoop(); }
  drawWave();
}
function toggleLoop() {
  loopOn = !loopOn;
  if (playing) {
    if (loopOn && loopIn !== null && loopOut !== null && loopIn < loopOut) applyLoop();
    else if (!loopOn && srcNode) { var t = audTime(); stopPlay(); startAt(t); }
  }
  updLoopUI();
}
function applyLoop() {
  if (loopIn === null || loopOut === null || loopIn >= loopOut) return;
  var t = audTime(), was = playing; stopPlay();
  if (t >= loopOut || t < loopIn) t = loopIn;
  if (was) startAt(t);
}
function updLoopUI() {
  document.getElementById('loopToggle').className = 'toggle' + (loopOn ? ' on' : '');
  document.getElementById('togLbl').textContent = loopOn ? 'ON' : 'OFF';
  drawWave();
}

// ══════════════════════════════════════════════════════════════════════════════
//  3-band frequency peaks
// ══════════════════════════════════════════════════════════════════════════════
function computePeaks(buf) {
  var sampleRate = buf.sampleRate;
  var ch0 = buf.getChannelData(0);
  var ch1 = buf.numberOfChannels > 1 ? buf.getChannelData(1) : null;
  var N = ch0.length, spb = N / NPKS;
  pkMin = new Float32Array(NPKS); pkMax = new Float32Array(NPKS);
  pkLow = new Float32Array(NPKS); pkMid = new Float32Array(NPKS); pkHigh = new Float32Array(NPKS);
  var alphaLow = Math.min(1, 2 * Math.PI * 250 / sampleRate);
  var alphaMid = Math.min(1, 2 * Math.PI * 2500 / sampleRate);
  var lpLow = 0, lpMid = 0;
  for (var i = 0; i < NPKS; i++) {
    var s0 = Math.floor(i * spb), s1 = Math.min(N, Math.floor((i + 1) * spb));
    var mn = 0, mx = 0, sumL = 0, sumM = 0, sumH = 0, count = s1 - s0;
    for (var j = s0; j < s1; j++) {
      var v = ch1 ? (ch0[j] + ch1[j]) * 0.5 : ch0[j];
      if (v < mn) mn = v; if (v > mx) mx = v;
      lpLow += alphaLow * (v - lpLow); lpMid += alphaMid * (v - lpMid);
      sumL += Math.abs(lpLow); sumM += Math.abs(lpMid - lpLow); sumH += Math.abs(v - lpMid);
    }
    pkMin[i] = mn; pkMax[i] = mx;
    if (count > 0) { pkLow[i] = sumL / count; pkMid[i] = sumM / count; pkHigh[i] = sumH / count; }
  }
  var maxL = 0, maxM = 0, maxH = 0;
  for (var i = 0; i < NPKS; i++) {
    if (pkLow[i] > maxL) maxL = pkLow[i];
    if (pkMid[i] > maxM) maxM = pkMid[i];
    if (pkHigh[i] > maxH) maxH = pkHigh[i];
  }
  if (maxL > 0) for (var i = 0; i < NPKS; i++) pkLow[i] /= maxL;
  if (maxM > 0) for (var i = 0; i < NPKS; i++) pkMid[i] /= maxM;
  if (maxH > 0) for (var i = 0; i < NPKS; i++) pkHigh[i] /= maxH;
  log('Peaks: ' + NPKS + ' bins, sr=' + sampleRate);
}

// ══════════════════════════════════════════════════════════════════════════════
//  BPM Detection
// ══════════════════════════════════════════════════════════════════════════════
function detectBPM(buf, minBPM, maxBPM) {
  var sr = buf.sampleRate;
  var data = buf.getChannelData(0);
  var ch1 = buf.numberOfChannels > 1 ? buf.getChannelData(1) : null;
  var winSize = 1024;
  var nWins = Math.floor(data.length / winSize);
  var energy = new Float32Array(nWins);
  for (var i = 0; i < nWins; i++) {
    var sum = 0, off = i * winSize;
    for (var j = 0; j < winSize; j++) {
      var v = ch1 ? (data[off + j] + ch1[off + j]) * 0.5 : data[off + j];
      sum += v * v;
    }
    energy[i] = sum / winSize;
  }
  var onset = new Float32Array(nWins);
  for (var i = 1; i < nWins; i++) onset[i] = Math.max(0, energy[i] - energy[i - 1]);

  var wps = sr / winSize;
  var minLag = Math.floor(wps * 60 / maxBPM);
  var maxLag = Math.ceil(wps * 60 / minBPM);
  var useWins = Math.min(nWins, Math.floor(wps * 30));

  var bestLag = minLag, bestCorr = 0;
  for (var lag = minLag; lag <= maxLag; lag++) {
    var corr = 0;
    for (var i = 0; i < useWins - lag; i++) corr += onset[i] * onset[i + lag];
    if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
  }
  // Parabolic interpolation for sub-sample precision
  var fracLag = bestLag;
  if (bestLag > minLag && bestLag < maxLag) {
    var corrM = 0, corrP = 0;
    for (var i = 0; i < useWins - bestLag - 1; i++) {
      corrM += onset[i] * onset[i + bestLag - 1];
      corrP += onset[i] * onset[i + bestLag + 1];
    }
    var denom = 2 * (2 * bestCorr - corrM - corrP);
    if (denom > 0) fracLag = bestLag + (corrM - corrP) / denom;
  }
  var bpm = Math.round((wps * 60 / fracLag) * 10) / 10;

  // Find best phase offset
  var beatDur = 60 / bpm;
  var nBeats = Math.floor(duration / beatDur);
  var steps = 48, bestOff = 0, bestScore = 0;
  for (var s = 0; s < steps; s++) {
    var off = (s / steps) * beatDur, score = 0;
    for (var bi = 0; bi < Math.min(nBeats, 200); bi++) {
      var t = off + bi * beatDur, wi = Math.floor(t * wps);
      for (var d = -2; d <= 2; d++) { var idx = wi + d; if (idx >= 0 && idx < nWins) score += onset[idx]; }
    }
    if (score > bestScore) { bestScore = score; bestOff = off; }
  }
  log('BPM detected: ' + bpm + ' (range ' + minBPM + '-' + maxBPM + '), offset: ' + bestOff.toFixed(3));
  return { bpm: bpm, offset: bestOff };
}

function refineBpmFromCurrent() {
  if (!audioBuf || gridBPM <= 0) return;
  // Narrow search: ±3% around current BPM
  var minB = Math.max(20, gridBPM * 0.97);
  var maxB = Math.min(300, gridBPM * 1.03);
  var result = detectBPM(audioBuf, minB, maxB);
  gridBPM = result.bpm; gridOffset = result.offset;
  updateGridDisplay(); saveGridSettings();
  log('Refined BPM: ' + gridBPM);
}

// ══════════════════════════════════════════════════════════════════════════════
//  Grid settings persistence
// ══════════════════════════════════════════════════════════════════════════════
function gridKey() { return 'grid__' + trkName; }
function saveGridSettings() {
  try {
    localStorage.setItem(gridKey(), JSON.stringify({
      bpm: gridBPM, offset: gridOffset, tsTop: gridTimeSigTop, tsBot: gridTimeSigBot,
      detBpm: detectedBPM, detOff: detectedOffset
    }));
  } catch(e) {}
}
function loadGridSettings() {
  try { var s = localStorage.getItem(gridKey()); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}

// ══════════════════════════════════════════════════════════════════════════════
//  Grid UI + Time Signatures
// ══════════════════════════════════════════════════════════════════════════════
function loadCustomTimeSigs() {
  try { customTimeSigs = JSON.parse(localStorage.getItem('customTimeSigs') || '[]'); } catch(e) { customTimeSigs = []; }
}
function saveCustomTimeSigs() {
  localStorage.setItem('customTimeSigs', JSON.stringify(customTimeSigs));
}

function buildTsSelect() {
  var sel = document.getElementById('gridTsSel');
  sel.innerHTML = '';
  var all = DEFAULT_TS.slice();
  customTimeSigs.forEach(function(ts) { if (all.indexOf(ts) < 0) all.push(ts); });
  all.forEach(function(ts) {
    var opt = document.createElement('option');
    opt.value = ts; opt.textContent = ts; sel.appendChild(opt);
  });
  var optC = document.createElement('option');
  optC.value = 'custom'; optC.textContent = 'Custom...'; sel.appendChild(optC);
  sel.value = gridTimeSigTop + '/' + gridTimeSigBot;
  // If current TS not in list, add it
  if (sel.value !== gridTimeSigTop + '/' + gridTimeSigBot) {
    var opt = document.createElement('option');
    var v = gridTimeSigTop + '/' + gridTimeSigBot;
    opt.value = v; opt.textContent = v;
    sel.insertBefore(opt, sel.lastChild);
    sel.value = v;
  }
}

function updateGridDisplay() {
  var disp = gridBPM > 0 ? gridBPM.toFixed(1) + ' BPM' : '-- BPM';
  document.getElementById('gridBpmDisp').textContent = disp;
  document.getElementById('gridTsDisp').textContent = gridTimeSigTop + '/' + gridTimeSigBot;
  document.getElementById('gridBpmInp').value = gridBPM > 0 ? gridBPM.toFixed(1) : '';
  buildTsSelect();
  drawWave();
}

function toggleGridEdit() {
  gridEditMode = !gridEditMode;
  var panel = document.getElementById('gridPanel');
  var btn = document.getElementById('gridEditBtn');
  if (gridEditMode) { panel.classList.add('show'); btn.textContent = 'Done'; btn.classList.add('active'); }
  else { panel.classList.remove('show'); btn.textContent = 'Edit Grid'; btn.classList.remove('active'); saveGridSettings(); document.getElementById('customTsArea').style.display = 'none'; }
}

function onBpmInput(val) {
  var v = parseFloat(val);
  if (v >= 20 && v <= 300) { gridBPM = Math.round(v * 10) / 10; updateGridDisplay(); saveGridSettings(); }
}
function nudgeBpm(delta) {
  gridBPM = Math.round((gridBPM + delta) * 10) / 10;
  if (gridBPM < 20) gridBPM = 20; if (gridBPM > 300) gridBPM = 300;
  updateGridDisplay(); saveGridSettings();
}

function onTsChange() {
  var val = document.getElementById('gridTsSel').value;
  if (val === 'custom') {
    document.getElementById('customTsArea').style.display = 'block';
    return;
  }
  document.getElementById('customTsArea').style.display = 'none';
  var parts = val.split('/');
  gridTimeSigTop = parseInt(parts[0]); gridTimeSigBot = parseInt(parts[1]);
  updateGridDisplay(); saveGridSettings();
}

function applyCustomTs() {
  var top = parseInt(document.getElementById('customTsTop').value);
  var bot = parseInt(document.getElementById('customTsBot').value);
  if (!top || !bot || top < 1 || bot < 1) return;
  gridTimeSigTop = top; gridTimeSigBot = bot;
  document.getElementById('customTsArea').style.display = 'none';
  updateGridDisplay(); saveGridSettings();
}

function saveCustomTs() {
  var top = parseInt(document.getElementById('customTsTop').value);
  var bot = parseInt(document.getElementById('customTsBot').value);
  if (!top || !bot || top < 1 || bot < 1) return;
  var ts = top + '/' + bot;
  if (customTimeSigs.indexOf(ts) < 0 && DEFAULT_TS.indexOf(ts) < 0) {
    customTimeSigs.push(ts); saveCustomTimeSigs();
  }
  gridTimeSigTop = top; gridTimeSigBot = bot;
  document.getElementById('customTsArea').style.display = 'none';
  updateGridDisplay(); saveGridSettings();
}

function resetToDetected() {
  if (detectedBPM <= 0) return;
  gridBPM = detectedBPM; gridOffset = detectedOffset;
  updateGridDisplay(); saveGridSettings();
}

function tapTempo() {
  var now = performance.now();
  if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 2500) tapTimes = [];
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length >= 2) {
    var total = 0;
    for (var i = 1; i < tapTimes.length; i++) total += tapTimes[i] - tapTimes[i - 1];
    var bpm = Math.round(60000 / (total / (tapTimes.length - 1)) * 10) / 10;
    document.getElementById('tapBpmVal').textContent = bpm.toFixed(1) + ' BPM';
  } else {
    document.getElementById('tapBpmVal').textContent = 'tap...';
  }
}

function applyTapBpm() {
  var text = document.getElementById('tapBpmVal').textContent;
  var m = text.match(/([\d.]+)/);
  if (m) {
    gridBPM = parseFloat(m[1]);
    updateGridDisplay(); saveGridSettings();
    tapTimes = [];
    document.getElementById('tapBpmVal').textContent = 'Applied!';
    setTimeout(function() { document.getElementById('tapBpmVal').textContent = '--'; }, 1000);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  Canvas
// ══════════════════════════════════════════════════════════════════════════════
function initCanvas() {
  cv = document.getElementById('waveCanvas');
  cx = cv.getContext('2d');
  window.addEventListener('resize', function(){ setTimeout(resizeCanvas, 80); });
  cv.addEventListener('touchstart', onTS, { passive: false });
  cv.addEventListener('touchmove', onTM, { passive: false });
  cv.addEventListener('touchend', onTE, { passive: false });
  cv.addEventListener('mousedown', onMD);
  window.addEventListener('mousemove', onMM);
  window.addEventListener('mouseup', onMU);
  requestAnimationFrame(animLoop);
}

function resizeCanvas() {
  if (!cv) return;
  var dpr = window.devicePixelRatio || 1;
  var r = cv.getBoundingClientRect();
  if (r.width < 1 || r.height < 1) return;
  cvW = r.width; cvH = r.height;
  cv.width = Math.round(r.width * dpr); cv.height = Math.round(r.height * dpr);
  cx = cv.getContext('2d'); cx.scale(dpr, dpr);
  drawWave();
}

function animLoop() {
  if (playing && audioBuf) {
    var t = audTime(), len = vEnd - vStart, px = (t - vStart) / len;
    if (!loopOn && (px > 0.85 || px < 0)) {
      vStart = Math.max(0, Math.min(duration - len, t - len * 0.2));
      vEnd = vStart + len;
    }
    drawWave();
    document.getElementById('waveTime').textContent = fmt(t) + ' / ' + fmt(duration);
  }
  requestAnimationFrame(animLoop);
}

// ══════════════════════════════════════════════════════════════════════════════
//  Draw waveform
// ══════════════════════════════════════════════════════════════════════════════
function drawWave() {
  if (!cx || cvW < 1) return;
  var W = cvW, H = cvH;
  cx.clearRect(0, 0, W, H);
  cx.fillStyle = '#1c1c1e'; cx.fillRect(0, 0, W, H);
  if (!duration) return;

  var loops = getLoops();
  LOOP_LANES_ZONE = loops.length > 0 ? loops.length * (LOOP_LANE_H + LOOP_LANE_GAP) + 4 : 0;
  var waveH = H - LOOP_LANES_ZONE;

  // Saved loop lanes at bottom
  for (var li = 0; li < loops.length; li++) {
    var sl = loops[li], color = getLoopColor(li);
    var x1 = t2x(sl.i), x2 = t2x(sl.o);
    var laneY = H - LOOP_LANES_ZONE + 4 + li * (LOOP_LANE_H + LOOP_LANE_GAP);
    cx.fillStyle = color; cx.fillRect(x1, laneY, Math.max(1, x2 - x1), LOOP_LANE_H);
  }

  // Active loop overlay
  if (loopOn && loopIn !== null && loopOut !== null && loopIn < loopOut) {
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.fillRect(t2x(loopIn), 0, t2x(loopOut) - t2x(loopIn), waveH);
  } else if (loopIn !== null && loopOut !== null && loopIn < loopOut) {
    cx.fillStyle = 'rgba(255,214,10,0.08)';
    cx.fillRect(t2x(loopIn), 0, t2x(loopOut) - t2x(loopIn), waveH);
  }

  // Center line
  cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(0, waveH/2); cx.lineTo(W, waveH/2); cx.stroke();

  // 3-band colored waveform
  if (pkMin && pkMax && pkLow) {
    for (var x = 0; x < W; x++) {
      var ta = vStart + (x / W) * (vEnd - vStart);
      var tb = vStart + ((x+1) / W) * (vEnd - vStart);
      var b0 = Math.max(0, Math.floor(ta / duration * NPKS));
      var b1 = Math.min(NPKS-1, Math.ceil(tb / duration * NPKS));
      var mn = 0, mx = 0, bL = 0, bM = 0, bH = 0, cnt = 0;
      for (var b = b0; b <= b1; b++) {
        if (pkMin[b] < mn) mn = pkMin[b]; if (pkMax[b] > mx) mx = pkMax[b];
        bL += pkLow[b]; bM += pkMid[b]; bH += pkHigh[b]; cnt++;
      }
      if (cnt > 0) { bL /= cnt; bM /= cnt; bH /= cnt; }
      var total = bL + bM + bH, r, g, bl;
      if (total > 0.001) {
        var wL = bL*bL, wM = bM*bM, wH = bH*bH, wT = wL + wM + wH;
        wL /= wT; wM /= wT; wH /= wT;
        r = Math.round(50*wL + 50*wM + 255*wH);
        g = Math.round(100*wL + 255*wM + 70*wH);
        bl = Math.round(255*wL + 100*wM + 230*wH);
        var amp = Math.max(Math.abs(mn), Math.abs(mx));
        var bright = 0.55 + 0.45 * Math.min(1, amp * 2.5);
        r = Math.min(255, Math.round(r * bright));
        g = Math.min(255, Math.round(g * bright));
        bl = Math.min(255, Math.round(bl * bright));
      } else { r = 25; g = 40; bl = 80; }
      cx.fillStyle = 'rgb(' + r + ',' + g + ',' + bl + ')';
      var cy2 = waveH / 2, yT = cy2 - mx * cy2, yB = cy2 - mn * cy2;
      cx.fillRect(x, yT, 1, Math.max(1, yB - yT));
    }
  }

  // Beat grid overlay
  if (gridBPM > 0) {
    var beatDur = 60 / gridBPM, beatsPerBar = gridTimeSigTop;
    var firstBeat = Math.floor((vStart - gridOffset) / beatDur) - 1;
    var lastBeat = Math.ceil((vEnd - gridOffset) / beatDur) + 1;
    for (var bi = firstBeat; bi <= lastBeat; bi++) {
      var t = gridOffset + bi * beatDur;
      if (t < vStart - beatDur * 0.1 || t > vEnd + beatDur * 0.1) continue;
      var gx = t2x(t);
      if (gx < -2 || gx > W + 2) continue;
      var beatInBar = ((bi % beatsPerBar) + beatsPerBar) % beatsPerBar;
      if (beatInBar === 0) {
        cx.strokeStyle = 'rgba(255,214,10,0.55)'; cx.lineWidth = 2;
      } else {
        cx.strokeStyle = 'rgba(255,214,10,0.18)'; cx.lineWidth = 0.7;
      }
      cx.beginPath(); cx.moveTo(gx, 0); cx.lineTo(gx, waveH); cx.stroke();
    }
  }

  // Grid edit mode: draw zone divider at 50% height
  if (gridEditMode) {
    cx.strokeStyle = 'rgba(255,214,10,0.3)'; cx.lineWidth = 1;
    cx.setLineDash([4, 4]);
    cx.beginPath(); cx.moveTo(0, waveH * 0.5); cx.lineTo(W, waveH * 0.5); cx.stroke();
    cx.setLineDash([]);
  }

  // Hot cue markers
  var hcs = getHotCues();
  for (var hi = 0; hi < hcs.length; hi++) {
    var hcx = t2x(hcs[hi].time);
    if (hcx < -10 || hcx > W + 10) continue;
    var hcColor = HC_COLORS[hi % HC_COLORS.length];
    // Small diamond at bottom of waveform area
    var dy = waveH - 12;
    cx.fillStyle = hcColor;
    cx.beginPath();
    cx.moveTo(hcx, dy - 6); cx.lineTo(hcx + 6, dy); cx.lineTo(hcx, dy + 6); cx.lineTo(hcx - 6, dy);
    cx.closePath(); cx.fill();
    // Thin line
    cx.strokeStyle = hcColor; cx.lineWidth = 0.8; cx.globalAlpha = 0.5;
    cx.beginPath(); cx.moveTo(hcx, 0); cx.lineTo(hcx, waveH); cx.stroke();
    cx.globalAlpha = 1;
    // Number
    cx.fillStyle = '#000'; cx.font = 'bold 8px sans-serif'; cx.textAlign = 'center';
    cx.fillText(hi + 1, hcx, dy + 3);
  }

  // Cue point marker (orange triangle at top)
  if (cuePoint !== null) {
    var cuex = t2x(cuePoint);
    if (cuex >= -10 && cuex <= W + 10) {
      cx.strokeStyle = '#ff9f0a'; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(cuex, 0); cx.lineTo(cuex, waveH); cx.stroke();
      cx.fillStyle = '#ff9f0a';
      cx.beginPath(); cx.moveTo(cuex - 7, 0); cx.lineTo(cuex + 7, 0); cx.lineTo(cuex, 14); cx.closePath(); cx.fill();
      // C label
      cx.fillStyle = '#000'; cx.font = 'bold 9px sans-serif'; cx.textAlign = 'center';
      cx.fillText('C', cuex, 10);
    }
  }

  // Loop markers
  if (loopIn !== null) drawMarker(t2x(loopIn), '#30d158', waveH);
  if (loopOut !== null) drawMarker(t2x(loopOut), '#ff453a', waveH);

  // Playhead
  var ph = t2x(audTime());
  if (ph >= -10 && ph <= W + 10) {
    cx.strokeStyle = '#ffffff'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.moveTo(ph, 0); cx.lineTo(ph, H); cx.stroke();
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.moveTo(ph - 8, 0); cx.lineTo(ph + 8, 0); cx.lineTo(ph, 14); cx.closePath(); cx.fill();
  }
}

function drawMarker(x, color, h) {
  if (x < -20 || x > cvW + 20) return;
  cx.strokeStyle = color; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, h); cx.stroke();
  cx.fillStyle = color;
  cx.beginPath(); cx.moveTo(x-9, 0); cx.lineTo(x+9, 0); cx.lineTo(x, 18); cx.closePath(); cx.fill();
}

function t2x(t) { return ((t - vStart) / (vEnd - vStart)) * cvW; }
function x2t(x) { return vStart + (x / cvW) * (vEnd - vStart); }

function doZoom(f) {
  if (!duration) return;
  var c = (vStart + vEnd) / 2;
  var len = Math.max(0.5, Math.min(duration, (vEnd - vStart) * f));
  vStart = Math.max(0, c - len/2);
  vEnd = Math.min(duration, vStart + len);
  if (vEnd === duration) vStart = Math.max(0, vEnd - len);
  drawWave();
}

// ══════════════════════════════════════════════════════════════════════════════
//  Touch + Mouse
// ══════════════════════════════════════════════════════════════════════════════
function tx(touch) { return touch.clientX - cv.getBoundingClientRect().left; }

function onTS(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    drgType = 'pinch';
    pnDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    pnLen0 = vEnd - vStart;
    pnCtr0 = x2t((tx(e.touches[0]) + tx(e.touches[1])) / 2);
    return;
  }
  var x = tx(e.touches[0]);
  var r = cv.getBoundingClientRect();
  var y = e.touches[0].clientY - r.top;
  drgX0 = x; drgMoved = false; drgVS0 = vStart; drgVE0 = vEnd; drgGridOff0 = gridOffset;
  var phx = t2x(audTime());
  if (Math.abs(x - phx) < 24 && y < 30) { drgType = 'playhead'; return; }
  if (loopIn !== null && Math.abs(x - t2x(loopIn)) < 24) { drgType = 'in'; return; }
  if (loopOut !== null && Math.abs(x - t2x(loopOut)) < 24) { drgType = 'out'; return; }
  // Grid edit mode: top half = shift grid, bottom half = pan view
  if (gridEditMode) { drgType = (y < cvH * 0.5) ? 'gridshift' : 'pan'; }
  else { drgType = 'pan'; }
}

function onTM(e) {
  e.preventDefault();
  if (drgType === 'pinch' && e.touches.length === 2) {
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    var maxD = duration || 100;
    var newLen = Math.max(0.5, Math.min(maxD, pnLen0 * pnDist0 / d));
    var ratio = (pnCtr0 - vStart) / (vEnd - vStart);
    vStart = Math.max(0, pnCtr0 - ratio * newLen);
    vEnd = Math.min(maxD, vStart + newLen);
    drawWave(); return;
  }
  if (e.touches.length !== 1 || !drgType) return;
  var x = tx(e.touches[0]);
  if (Math.abs(x - drgX0) > 3) drgMoved = true;
  handleDrag(x);
}

function onTE(e) {
  e.preventDefault();
  if ((drgType === 'in' || drgType === 'out') && loopOn && playing) applyLoop();
  if (drgType === 'gridshift' && drgMoved) saveGridSettings();
  if ((drgType === 'pan' || drgType === 'gridshift') && !drgMoved) seekTo(x2t(drgX0));
  drgType = null; pnDist0 = null;
}

var mouseDown = false;
function onMD(e) {
  var r = cv.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
  drgX0 = x; drgMoved = false; drgVS0 = vStart; drgVE0 = vEnd; drgGridOff0 = gridOffset;
  mouseDown = true;
  var phx = t2x(audTime());
  if (Math.abs(x - phx) < 12 && y < 20) { drgType = 'playhead'; return; }
  if (loopIn !== null && Math.abs(x - t2x(loopIn)) < 12) { drgType = 'in'; return; }
  if (loopOut !== null && Math.abs(x - t2x(loopOut)) < 12) { drgType = 'out'; return; }
  if (gridEditMode) { drgType = (y < cvH * 0.5) ? 'gridshift' : 'pan'; }
  else { drgType = 'pan'; }
}
function onMM(e) {
  if (!mouseDown || !drgType) return;
  var x = e.clientX - cv.getBoundingClientRect().left;
  if (Math.abs(x - drgX0) > 3) drgMoved = true;
  handleDrag(x);
}
function onMU(e) {
  if (!mouseDown) return;
  mouseDown = false;
  if ((drgType === 'in' || drgType === 'out') && loopOn && playing) applyLoop();
  if (drgType === 'gridshift' && drgMoved) saveGridSettings();
  if ((drgType === 'pan' || drgType === 'gridshift') && !drgMoved) seekTo(x2t(e.clientX - cv.getBoundingClientRect().left));
  drgType = null;
}

function handleDrag(x) {
  if (drgType === 'playhead') {
    seekTo(Math.max(0, Math.min(duration, x2t(x))));
  } else if (drgType === 'in') {
    loopIn = Math.max(0, Math.min(loopOut !== null ? loopOut - 0.05 : duration, x2t(x)));
    document.getElementById('inTime').textContent = fmt(loopIn); drawWave();
  } else if (drgType === 'out') {
    loopOut = Math.max(loopIn !== null ? loopIn + 0.05 : 0, Math.min(duration, x2t(x)));
    document.getElementById('outTime').textContent = fmt(loopOut); drawWave();
  } else if (drgType === 'gridshift' && drgMoved) {
    var tpp = (drgVE0 - drgVS0) / cvW;
    gridOffset = drgGridOff0 + (x - drgX0) * tpp;
    updateGridDisplay();
  } else if (drgType === 'pan' && drgMoved) {
    var tpp = (drgVE0 - drgVS0) / cvW, len = drgVE0 - drgVS0;
    vStart = Math.max(0, Math.min(duration - len, drgVS0 - (x - drgX0) * tpp));
    vEnd = vStart + len; drawWave();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  Loops storage
// ══════════════════════════════════════════════════════════════════════════════
function skey() { return 'loops__' + trkName; }
function getLoops() { try { return JSON.parse(localStorage.getItem(skey()) || '[]'); } catch(e) { return []; } }
function getLoopColor(idx) { return LOOP_COLORS[idx % LOOP_COLORS.length]; }

function saveLoop() {
  if (loopIn === null || loopOut === null || loopIn >= loopOut) { alert('Set valid In and Out points first.'); return; }
  var loops = getLoops();
  var name = document.getElementById('loopName').value.trim() || ('Loop ' + (loops.length + 1));
  var entry = { name: name, i: loopIn, o: loopOut };
  if (editIdx >= 0 && editIdx < loops.length) loops[editIdx] = entry; else loops.push(entry);
  localStorage.setItem(skey(), JSON.stringify(loops));
  editIdx = -1; resetEditor(); renderLoops(); drawWave();
}
function loadLoop(i) {
  var l = getLoops()[i]; if (!l) return;
  loopIn = l.i; loopOut = l.o; loopOn = true;
  document.getElementById('inTime').textContent = fmt(loopIn);
  document.getElementById('outTime').textContent = fmt(loopOut);
  updLoopUI(); stopPlay(); startAt(loopIn);
  document.getElementById('deckCard').scrollIntoView({ behavior: 'smooth' });
}
function editLoop(i) {
  var l = getLoops()[i]; if (!l) return;
  loopIn = l.i; loopOut = l.o; loopOn = true;
  document.getElementById('inTime').textContent = fmt(loopIn);
  document.getElementById('outTime').textContent = fmt(loopOut);
  document.getElementById('loopName').value = l.name;
  editIdx = i;
  document.getElementById('saveBtn').textContent = 'Update';
  document.getElementById('editBanner').style.display = 'block';
  updLoopUI(); stopPlay(); startAt(loopIn); drawWave();
  document.getElementById('deckCard').scrollIntoView({ behavior: 'smooth' });
}
function deleteLoop(i) {
  var loops = getLoops(); loops.splice(i, 1);
  localStorage.setItem(skey(), JSON.stringify(loops));
  if (editIdx === i) { editIdx = -1; resetEditor(); }
  renderLoops(); drawWave();
}
function resetEditor() {
  document.getElementById('inTime').textContent = '--:--';
  document.getElementById('outTime').textContent = '--:--';
  document.getElementById('loopName').value = '';
  document.getElementById('saveBtn').textContent = 'Save';
  document.getElementById('editBanner').style.display = 'none';
}
function renderLoops() {
  var loops = getLoops(), el = document.getElementById('loopList');
  if (!loops.length) { el.innerHTML = '<div class="empty">No saved loops yet</div>'; return; }
  el.innerHTML = loops.map(function(l, i) {
    var color = getLoopColor(i);
    return '<div class="loop-item">' +
      '<div class="ldot" style="background:' + color + '"></div>' +
      '<div class="linfo"><div class="lname">' + esc(l.name) + '</div>' +
      '<div class="ltimes">' + fmt(l.i) + ' &rarr; ' + fmt(l.o) + '</div></div>' +
      '<div class="lacts">' +
      '<button class="labtn la-load" onclick="loadLoop('+i+')">Load</button>' +
      '<button class="labtn la-edit" onclick="editLoop('+i+')">Edit</button>' +
      '<button class="labtn la-del" onclick="deleteLoop('+i+')">Del</button>' +
      '</div></div>';
  }).join('');
}

// ══════════════════════════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════════════════════════
function setStatus(msg, cls) {
  var el = document.getElementById('statusBar');
  el.textContent = msg; el.className = 'status' + (cls ? ' ' + cls : '');
  el.style.display = msg ? 'block' : 'none';
}
function fmt(s) {
  if (s == null || isNaN(s)) return '0:00';
  var m = Math.floor(s / 60), sec = Math.floor(s % 60), ms = Math.floor((s % 1) * 10);
  return m + ':' + sec.toString().padStart(2, '0') + '.' + ms;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════════
loadCustomTimeSigs();
initCanvas();
renderLibrary();
log('Boot OK v8');
</script>
